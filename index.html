<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบส่งผลงานกิจกรรมค่ายฯ</title>
<link rel="icon" id="favicon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎨%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
  :root{
    --gold:#C9A961;
    --gold-dark:#8C7233;
    --gold-deep:#5A4A24;
    --gold-light:#E8D9A8;
    --cream:#FAF7F0;
    --cream-dark:#F0E9D6;
    --white:#FFFFFF;
    --ink:#2A2A2A;
    --ink-soft:#5C5C5C;
    --line:#E6DFCB;
    --shadow:0 8px 30px rgba(140,114,51,.08);
    --shadow-strong:0 18px 50px rgba(140,114,51,.18);
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{font-family:'Sarabun',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;font-size:16px;line-height:1.5}
  body{background:linear-gradient(180deg,var(--cream) 0%,#fff 100%) fixed}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,textarea,select{font-family:inherit;font-size:16px}
  a{color:inherit;text-decoration:none}

  /* Header */
  .header{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
  .header-inner{max-width:1200px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .brand{display:flex;align-items:center;gap:12px;cursor:pointer;flex:1;min-width:0}
  .brand-logo{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--gold) 0%,var(--gold-dark) 100%);display:grid;place-items:center;color:#fff;font-weight:800;font-size:20px;flex-shrink:0;box-shadow:var(--shadow);overflow:hidden}
  .brand-logo img{width:100%;height:100%;object-fit:cover}
  .brand-text{min-width:0}
  .brand-title{font-weight:700;font-size:15px;color:var(--gold-deep);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brand-sub{font-size:11px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .gear-btn{width:42px;height:42px;border-radius:50%;background:var(--white);border:1px solid var(--line);display:grid;place-items:center;transition:.2s;flex-shrink:0}
  .gear-btn:hover{background:var(--gold);color:#fff;border-color:var(--gold);transform:rotate(90deg)}
  .gear-btn svg{width:20px;height:20px}

  /* Main container */
  main{max-width:1200px;margin:0 auto;padding:24px 20px 60px}

  /* Hero */
  .hero{text-align:center;padding:30px 0 36px;position:relative}
  .hero::before{content:'';position:absolute;left:50%;top:0;transform:translateX(-50%);width:90px;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
  .hero h1{font-size:clamp(22px,5vw,32px);font-weight:800;color:var(--gold-deep);margin-bottom:8px;letter-spacing:-0.5px}
  .hero p{color:var(--ink-soft);font-size:14px;max-width:560px;margin:0 auto;padding:0 20px}
  .event-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:var(--cream-dark);border-radius:99px;margin-top:14px;font-size:12px;color:var(--gold-deep);font-weight:600}
  .event-pill::before{content:'●';color:var(--gold)}

  /* Section header */
  .sec-head{display:flex;align-items:center;gap:12px;margin:30px 0 16px}
  .sec-head .num{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#fff;display:grid;place-items:center;font-weight:700;font-size:13px;flex-shrink:0}
  .sec-head h2{font-size:17px;font-weight:700;color:var(--gold-deep)}
  .sec-head .line{flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}

  /* Card grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
  .card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:22px 20px;cursor:pointer;transition:.25s;position:relative;overflow:hidden;text-align:left;width:100%}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--gold-dark));opacity:0;transition:.25s}
  .card:hover{transform:translateY(-3px);box-shadow:var(--shadow-strong);border-color:var(--gold-light)}
  .card:hover::before{opacity:1}
  .card-icon{width:48px;height:48px;border-radius:12px;background:var(--cream);display:grid;place-items:center;margin-bottom:14px;color:var(--gold-dark);transition:.25s}
  .card:hover .card-icon{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#fff}
  .card-icon svg{width:24px;height:24px}
  .card-title{font-weight:700;font-size:16px;margin-bottom:4px;color:var(--ink)}
  .card-desc{font-size:13px;color:var(--ink-soft)}
  .card-arrow{position:absolute;right:18px;bottom:18px;color:var(--gold);opacity:0;transition:.25s}
  .card:hover .card-arrow{opacity:1;transform:translateX(3px)}

  /* Generic page */
  .page{background:var(--white);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);border:1px solid var(--line)}
  .page-head{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--line)}
  .back-btn{width:36px;height:36px;border-radius:50%;background:var(--cream);display:grid;place-items:center;color:var(--gold-dark);transition:.2s;flex-shrink:0}
  .back-btn:hover{background:var(--gold);color:#fff}
  .page-title{font-size:18px;font-weight:700;color:var(--gold-deep);flex:1}

  /* Forms */
  .form-row{margin-bottom:14px}
  label{display:block;font-size:13px;font-weight:600;color:var(--gold-deep);margin-bottom:6px}
  label .req{color:#c43d3d;margin-left:2px}
  .input,.textarea,select{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;background:var(--white);color:var(--ink);transition:.2s}
  .input:focus,.textarea:focus,select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,169,97,.15)}
  .textarea{resize:vertical;min-height:90px;font-family:inherit}
  .file-input{display:block;padding:12px 14px;border:2px dashed var(--gold-light);border-radius:10px;background:var(--cream);text-align:center;color:var(--ink-soft);cursor:pointer;transition:.2s;font-size:13px}
  .file-input:hover{border-color:var(--gold);background:var(--cream-dark)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 22px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#fff;font-weight:600;border-radius:10px;transition:.2s;font-size:15px;border:none}
  .btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-strong)}
  .btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
  .btn-ghost{background:var(--cream);color:var(--gold-dark)}
  .btn-ghost:hover{background:var(--cream-dark);color:var(--gold-deep)}
  .btn-block{display:flex;width:100%}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}

  /* Station list */
  .station-list{display:grid;gap:12px}
  .station-item{display:flex;align-items:center;gap:14px;padding:16px 18px;background:var(--cream);border-radius:12px;cursor:pointer;border:1px solid var(--line);transition:.2s;text-align:left;width:100%}
  .station-item:hover{background:var(--white);border-color:var(--gold);transform:translateX(3px);box-shadow:var(--shadow)}
  .station-num{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--gold-light),var(--gold));display:grid;place-items:center;color:#fff;font-weight:800;flex-shrink:0}
  .station-name{font-weight:600;flex:1}
  .station-arrow{color:var(--gold-dark)}

  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(45,38,18,.55);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s}
  .modal-bg.show{display:flex}
  .modal{background:var(--white);border-radius:var(--radius);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-strong);animation:slideUp .3s}
  .modal-head{padding:18px 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff;z-index:1}
  .modal-title{font-weight:700;color:var(--gold-deep);font-size:16px}
  .close-btn{width:32px;height:32px;border-radius:50%;background:var(--cream);display:grid;place-items:center;color:var(--ink-soft)}
  .close-btn:hover{background:#fee;color:#c43d3d}
  .modal-body{padding:20px 22px}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

  /* Settings menu */
  .settings-menu{display:grid;gap:8px}
  .settings-item{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--cream);border-radius:10px;cursor:pointer;border:1px solid transparent;transition:.2s;text-align:left;width:100%}
  .settings-item:hover{background:var(--white);border-color:var(--gold-light);box-shadow:var(--shadow)}
  .settings-icon{color:var(--gold-dark);flex-shrink:0}
  .settings-text{flex:1}
  .settings-title{font-weight:600;font-size:14px}
  .settings-desc{font-size:12px;color:var(--ink-soft)}

  /* Ratings */
  .rating-question{padding:14px;background:var(--cream);border-radius:10px;margin-bottom:10px}
  .rating-q-text{font-weight:500;margin-bottom:10px;font-size:14px}
  .rating-options{display:flex;gap:6px;flex-wrap:wrap}
  .rating-opt{flex:1;min-width:54px;padding:10px 6px;background:#fff;border:1px solid var(--line);border-radius:8px;text-align:center;font-weight:600;cursor:pointer;transition:.15s;font-size:13px}
  .rating-opt:hover{border-color:var(--gold)}
  .rating-opt.active{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#fff;border-color:var(--gold-dark)}
  .rating-opt-label{font-size:10px;display:block;margin-top:2px;opacity:.85}

  /* Section pill (for evaluation categories) */
  .cat-head{display:flex;align-items:center;gap:10px;margin:20px 0 12px;padding:10px 14px;background:linear-gradient(90deg,var(--cream-dark),transparent);border-left:3px solid var(--gold);border-radius:0 8px 8px 0}
  .cat-head h3{font-size:15px;color:var(--gold-deep);font-weight:700}

  /* Dashboard */
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:18px}
  .stat-card{background:linear-gradient(135deg,var(--white),var(--cream));border:1px solid var(--line);border-radius:12px;padding:16px;text-align:center}
  .stat-num{font-size:28px;font-weight:800;color:var(--gold-dark);line-height:1}
  .stat-label{font-size:12px;color:var(--ink-soft);margin-top:4px}

  .table-wrap{overflow-x:auto;margin-top:14px;border:1px solid var(--line);border-radius:10px}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:600px}
  th{background:var(--cream);text-align:left;padding:10px 12px;font-weight:700;color:var(--gold-deep);border-bottom:2px solid var(--gold-light);white-space:nowrap}
  td{padding:10px 12px;border-bottom:1px solid var(--line)}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:var(--cream)}

  .bar-chart{display:flex;flex-direction:column;gap:8px;margin-top:10px}
  .bar-row{display:flex;align-items:center;gap:10px}
  .bar-label{flex:0 0 130px;font-size:12px;font-weight:500;color:var(--ink)}
  .bar-track{flex:1;height:24px;background:var(--cream);border-radius:6px;overflow:hidden;position:relative}
  .bar-fill{height:100%;background:linear-gradient(90deg,var(--gold-light),var(--gold-dark));display:flex;align-items:center;justify-content:flex-end;padding:0 8px;font-size:11px;color:#fff;font-weight:700;transition:width .8s}
  .bar-value{flex:0 0 auto;font-weight:700;color:var(--gold-dark);font-size:13px;min-width:40px;text-align:right}

  /* Question editor */
  .q-list{display:grid;gap:8px}
  .q-item{display:flex;gap:10px;align-items:flex-start;padding:10px;background:var(--cream);border-radius:8px}
  .q-item .q-num{flex:0 0 28px;height:28px;background:var(--gold);color:#fff;border-radius:50%;display:grid;place-items:center;font-size:13px;font-weight:700}
  .q-item input{flex:1;border:1px solid var(--line);background:#fff;font-size:13px}
  .q-item .del{background:transparent;color:#c43d3d;padding:6px}

  /* Toast */
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--gold-deep);color:#fff;padding:12px 22px;border-radius:99px;font-size:14px;font-weight:500;z-index:200;box-shadow:var(--shadow-strong);animation:fadeIn .2s}
  .toast.error{background:#c43d3d}
  .toast.warn{background:#b78a1e}

  /* Judging badges */
  .badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;line-height:1.6}
  .badge-done{background:#d4edda;color:#155724}
  .badge-progress{background:#fff3cd;color:#856404}
  .badge-pending{background:#e2e3e5;color:#383d41}

  /* Judge responsive */
  .judge-cards{display:grid;gap:12px}
  .judge-card{background:var(--white);border:1px solid var(--line);border-radius:12px;padding:14px 16px;transition:.2s}
  .judge-card:hover{border-color:var(--gold-light);box-shadow:var(--shadow)}
  .judge-card-top{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px}
  .judge-card-num{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--gold-light),var(--gold));color:#fff;display:grid;place-items:center;font-weight:700;font-size:14px;flex-shrink:0}
  .judge-card-info{flex:1;min-width:0}
  .judge-card-name{font-weight:700;font-size:15px;color:var(--ink);margin-bottom:3px}
  .judge-card-school{font-size:13px;color:var(--ink-soft);margin-bottom:2px}
  .judge-card-work{font-size:13px;color:var(--gold-deep);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .judge-card-actions{display:flex;align-items:center;gap:10px;padding-top:10px;border-top:1px solid var(--line)}
  .judge-view-btn{display:flex;align-items:center;gap:5px;padding:8px 14px;background:var(--cream);border:1px solid var(--line);border-radius:8px;font-size:13px;font-weight:500;color:var(--gold-dark);cursor:pointer;font-family:inherit;flex-shrink:0}
  .judge-view-btn:hover{background:var(--gold);color:#fff;border-color:var(--gold)}
  .judge-rank-wrap{display:flex;align-items:center;gap:8px;margin-left:auto}

  /* Footer */
  footer{text-align:center;padding:30px 20px;font-size:12px;color:var(--ink-soft);border-top:1px solid var(--line);margin-top:40px;background:var(--cream)}
  footer .dev{font-weight:600;color:var(--gold-dark)}

  /* Loading */
  .loader{display:inline-block;width:18px;height:18px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-state{text-align:center;padding:40px;color:var(--ink-soft)}

  /* Save button pulse animation */
  @keyframes savePulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.6)}60%{box-shadow:0 0 0 12px rgba(34,197,94,0)}}
  .judge-save-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px 22px;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;font-weight:700;border-radius:12px;font-size:16px;border:none;cursor:pointer;font-family:inherit;transition:.2s;margin-top:18px}
  .judge-save-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(34,197,94,.35)}
  .judge-save-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none;animation:none}
  .judge-save-btn.unsaved{animation:savePulse 1.4s infinite;box-shadow:0 4px 18px rgba(34,197,94,.4)}
  .judge-save-btn.saved{background:linear-gradient(135deg,#6b7280,#4b5563);animation:none}

  /* Event selector */
  .event-select{padding:8px 12px;background:#fff;border:1px solid var(--gold-light);border-radius:8px;font-size:13px;color:var(--gold-deep);font-weight:500;max-width:100%}

  /* Toggle switch */
  .toggle{position:relative;display:inline-block;width:42px;height:24px;flex-shrink:0}
  .toggle input{opacity:0;width:0;height:0}
  .toggle .slider{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:24px;transition:.2s}
  .toggle .slider::before{content:'';position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.2s}
  .toggle input:checked + .slider{background:var(--gold)}
  .toggle input:checked + .slider::before{transform:translateX(18px)}

  /* Mobile tweaks */
  @media (max-width:600px){
    main{padding:18px 14px 50px}
    .header-inner{padding:12px 14px}
    .brand-title{font-size:13px}
    .brand-sub{font-size:10px}
    .grid{grid-template-columns:1fr}
    .page{padding:18px 14px}
    .modal-body{padding:16px 16px}
    .rating-opt{min-width:44px;padding:8px 4px;font-size:12px}
    .stat-grid{grid-template-columns:repeat(2,1fr)}
    .bar-label{flex:0 0 90px}
  }
</style>
</head>

<header class="header">
  <div class="header-inner">
    <div class="brand" onclick="navigate('home')">
      <div class="brand-logo" id="brandLogo">ค</div>

</header>

<main id="app"></main>

const $ = s => document.querySelector(s);
const el = (tag, attrs={}, ...children) => {
  const e = document.createElement(tag);
  for(const k in attrs){
    if(k==='class') e.className = attrs[k];
    else if(k.startsWith('on')) e[k.toLowerCase()] = attrs[k];
    else if(k==='html') e.innerHTML = attrs[k];
    else e.setAttribute(k, attrs[k]);
  }
  for(const c of children){
    if(c==null) continue;
    if(typeof c==='string'||typeof c==='number') e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  }
  return e;
};
const esc = s => String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* ============================================================

   ============================================================ */
function detectInAppBrowser(){
  const ua = navigator.userAgent || '';
  if(!/Line\/|FBAN|FBAV|FB_IAB|Instagram|Messenger/i.test(ua)) return;
  const isLine    = /Line\//i.test(ua);
  const isAndroid = /Android/i.test(ua);
  const isIOS     = /iPhone|iPad|iPod/i.test(ua);
  const app       = isLine ? 'LINE' : 'Facebook / Messenger';
  const currentUrl = location.href;

  Swal.fire({
    icon: 'warning',
    title: '⚠️ แนะนำเปิดบราวเซอร์ภายนอก',
    html: `<div style="font-family:'Sarabun',sans-serif;font-size:14px;line-height:1.75;color:#444;text-align:left">
      ขณะนี้คุณเปิดระบบจาก <b>${app}</b> ซึ่งอาจทำให้<br>
      • การอัปโหลดไฟล์ทำงานไม่สมบูรณ์<br>
      • บางฟังก์ชันอาจผิดพลาดได้<br><br>
      แนะนำให้เปิดบน <b>Chrome</b> หรือ <b>Safari</b> เพื่อประสบการณ์ที่ดีที่สุด
    </div>`,
    showCancelButton: true,
    confirmButtonText: '🌐 เปิดบราวเซอร์ภายนอก',
    cancelButtonText: 'เข้าใจแล้ว อยู่ต่อ',
    confirmButtonColor: '#2563eb',
    cancelButtonColor: '#C9A961',
    reverseButtons: false,
    allowOutsideClick: true,
  }).then(result => {
    if(!result.isConfirmed) return;
    if(isAndroid){
      // Try Chrome intent on Android; fallback after 800 ms
      const intentUrl = 'intent://' + currentUrl.replace(/^https?:\/\//,'') +
        '#Intent;scheme=https;package=com.android.chrome;S.browser_fallback_url=' +
        encodeURIComponent(currentUrl) + ';end';
      location.href = intentUrl;
      setTimeout(()=>{ window.open(currentUrl,'_blank'); }, 800);
    } else if(isIOS){
      // iOS: try x-safari / googlechrome scheme, fallback to _blank
      const chromeUrl = currentUrl.replace(/^https?/,'googlechrome');
      window.location = chromeUrl;
      setTimeout(()=>{ window.open(currentUrl,'_blank'); }, 600);
    } else {
      window.open(currentUrl,'_blank');
    }
  });
}

async function loadAllData(){
  // Load events
  const evSnap = await db.collection('events').orderBy('createdAt','desc').get();
  state.events = evSnap.docs.map(d=>({id:d.id, ...d.data()}));

  // Normalize stations: ensure every station has a stable id (heal legacy data)
  for(const ev of state.events){
    if(!Array.isArray(ev.stations)) ev.stations = [];
    let needsUpdate = false;
    ev.stations = ev.stations.map((s, idx)=>{
      if(!s || typeof s !== 'object') return null;
      const out = {
        id: s.id || ('st'+(idx+1)+'_'+Math.random().toString(36).slice(2,7)),
        name: s.name || '',
        allowFile: s.allowFile !== false,
      };
      if(!s.id) needsUpdate = true;
      return out;
    }).filter(Boolean);
    if(needsUpdate){
      try{ await db.collection('events').doc(ev.id).update({stations: ev.stations}); }
      catch(e){ console.warn('Failed to migrate station ids for event', ev.id, e); }
    }
  }

  // Load settings
  const settingsDoc = await db.collection('settings').doc('global').get();
  if(settingsDoc.exists){
    const s = settingsDoc.data();
    state.settings = {
      logoUrl: s.logoUrl || '',
      evalStations: s.evalStations || DEFAULT_EVAL_STATIONS,
      questions: s.questions || DEFAULT_QUESTIONS,
      openQuestions: s.openQuestions || DEFAULT_OPEN_QS,
      appsScriptUrl: s.appsScriptUrl || '',
      lineGroupUrl: s.lineGroupUrl || '',
      hints: s.hints ? {
        submit:   { ...DEFAULT_HINTS.submit,   ...(s.hints.submit   || {}) },
        evaluate: { ...DEFAULT_HINTS.evaluate, ...(s.hints.evaluate || {}) },
        judge:    { ...DEFAULT_HINTS.judge,    ...(s.hints.judge    || {}) },
      } : JSON.parse(JSON.stringify(DEFAULT_HINTS)),
    };
    state.currentEventId = s.currentEventId || (state.events[0]?.id || null);
  } else {
    state.currentEventId = state.events[0]?.id || null;
  }

  // Initialize default event if none exist
  if(state.events.length === 0){
    const newEv = await createEvent({...DEFAULT_EVENT, stations: DEFAULT_EVENT.stations.map(s=>({...s}))});
    state.currentEventId = newEv.id;
    await saveSettings();
  }

  applyBranding();
}

async function createEvent(data){
  const docRef = await db.collection('events').add({
    name: data.name,
    date: data.date,
    location: data.location,
    speaker: data.speaker || '',
    stations: data.stations,
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
  });
  const ev = {id: docRef.id, ...data, createdAt: new Date()};
  state.events.unshift(ev);
  return ev;

async function updateEvent(id, data){
  await db.collection('events').doc(id).update(data);
  const i = state.events.findIndex(e=>e.id===id);
  if(i>=0) state.events[i] = {...state.events[i], ...data};

async function deleteEvent(id){
  await db.collection('events').doc(id).delete();
  state.events = state.events.filter(e=>e.id!==id);
  if(state.currentEventId === id){
    state.currentEventId = state.events[0]?.id || null;
    await saveSettings();
  }
}

/* ── Fetch with retry + per-attempt timeout ──────────────────
   fn        : async function that returns a Firestore snapshot
   maxRetries: total attempts (default 4)
   timeoutMs : max ms to wait per attempt before giving up (default 18000)
   ------------------------------------------------------------ */
async function fetchWithRetry(fn, maxRetries=3, timeoutMs=10000){
  let lastErr;
  for(let attempt=1; attempt<=maxRetries; attempt++){
    try{
      const result = await Promise.race([
        fn(),
        new Promise((_,reject)=>
          setTimeout(()=>reject(new Error('การเชื่อมต่อช้าเกินไป กำลังลองครั้งที่ '+attempt+'...')), timeoutMs)
        )
      ]);
      return result;
    } catch(e){
      lastErr = e;
      console.warn('Firestore attempt '+attempt+'/'+maxRetries+':', e.message);
      if(attempt < maxRetries){
        await new Promise(r=>setTimeout(r, 1500));
      }
    }
  }
  throw lastErr;
}

async function getSubmissions(eventId, forceServer=false){
  // Use cache only if it exists AND is not empty AND not forced to refresh
  if(!forceServer && _cache.submissions[eventId] && _cache.submissions[eventId].length > 0){
    return _cache.submissions[eventId];
  }
  const snap = await fetchWithRetry(()=>
    db.collection('submissions').where('eventId','==',eventId).get()
  );
  const docs = snap.docs.map(d=>({id:d.id, ...d.data()}));
  docs.sort((a,b)=>{
    const ta = (a.updatedAt || a.createdAt)?.toMillis?.() ?? 0;
    const tb = (b.updatedAt || b.createdAt)?.toMillis?.() ?? 0;
    return tb - ta;
  });
  _cache.submissions[eventId] = docs;
  return docs;
}

async function getEvaluations(eventId, forceServer=false){
  if(!forceServer && _cache.evaluations[eventId] && _cache.evaluations[eventId].length > 0){
    return _cache.evaluations[eventId];
  }
  const snap = await fetchWithRetry(()=>
    db.collection('evaluations').where('eventId','==',eventId).get()
  );
  const docs = snap.docs.map(d=>({id:d.id, ...d.data()}));
  _cache.evaluations[eventId] = docs;
  return docs;
}

async function getAllEvaluations(){
  const snap = await db.collection('evaluations').get();
  return snap.docs.map(d=>({id:d.id, ...d.data()}));
}

/* ============================================================
   FILE UPLOAD via Apps Script
   ============================================================ */
async function uploadFile(file, metadata){
  if(!state.settings.appsScriptUrl){
    throw new Error('ยังไม่ได้ตั้งค่า Google Apps Script URL ในเมนูตั้งค่า');
  }
  const base64 = await new Promise((resolve, reject)=>{
    const r = new FileReader();
    r.onload = ()=>resolve(r.result.split(',')[1]);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
  const resp = await fetch(state.settings.appsScriptUrl, {
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify({
      action:'upload',
      fileName: file.name,
      mimeType: file.type,
      base64Data: base64,
      metadata,
    })
  });
  const result = await resp.json();
  if(!result.success) throw new Error(result.error || 'อัปโหลดไม่สำเร็จ');
  return result;
}

    case 'home': renderHome(app); break;
    case 'submit': renderSubmitList(app); break;
    case 'submit-form': renderSubmitForm(app, route.params[0]); break;
    case 'evaluate': renderEvaluate(app); break;
    case 'report-submissions': renderReportSubmissions(app); break;
    case 'report-evaluations': renderReportEvaluations(app); break;
    case 'judge': renderJudgeList(app); break;
    case 'judge-station': renderJudgeStation(app, route.params[0]); break;
    default: renderHome(app);
  }
  applyBranding();
}

    return;
  }
  if(!ev.stations || ev.stations.length===0){
    app.innerHTML = `<div class="page"><div class="page-head"><button class="back-btn" onclick="navigate('submit')"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg></button><div class="page-title">ยังไม่มีฐานในรายการนี้</div></div><p style="color:var(--ink-soft);text-align:center;padding:20px">กรุณาเพิ่มฐานในเมนูตั้งค่า → จัดการรายการกิจกรรม</p></div>`;

  }
  // robust lookup: id → index → name
  let station = ev.stations.find(s=>s && s.id===stationKey);

    const idx = parseInt(stationKey,10);
    if(!isNaN(idx) && idx>=0 && idx<ev.stations.length) station = ev.stations[idx];

  if(!station){
    station = ev.stations.find(s=>s && s.name===stationKey);
  }
  if(!station){
    console.warn('Station not found. key=', stationKey, 'available=', ev.stations);
    app.innerHTML = `<div class="page">
      <div class="page-head">
        <button class="back-btn" onclick="navigate('submit')"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg></button>

        <p>คีย์ที่ค้นหา: <code style="background:#fff;padding:2px 6px;border-radius:4px">${esc(stationKey||'(ว่าง)')}</code></p>
        <p style="margin-top:8px">ฐานที่มีในระบบ:</p>
        <ul style="margin:6px 0 0 20px">${ev.stations.map(s=>`<li>${esc(s.name||'-')} <span style="opacity:.5">(id: ${esc(s.id||'ไม่มี')})</span></li>`).join('')}</ul>
        <p style="margin-top:12px">กรุณากลับไปเลือกฐานใหม่</p>
      </div>
    </div>`;

  }

    <div class="page">
      <div class="page-head">
        <button class="back-btn" onclick="navigate('submit')"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg></button>
        <div class="page-title">ส่งผลงาน · ${esc(station.name)}</div>
        <div id="autosaveTag" style="font-size:11px;color:var(--gold-dark);flex-shrink:0;display:none">💾 บันทึกแล้ว</div>
      </div>
      <div id="draftNotice" style="display:none;background:#FFF8E7;border:1px solid var(--gold-light);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--gold-deep);display:flex;align-items:center;gap:8px">
        <span>📋</span><span>พบข้อมูลที่พิมพ์ค้างไว้ — กรุณาตรวจสอบและส่งผลงานได้เลย</span>
        <button onclick="clearDraft('${station.id}')" style="margin-left:auto;font-size:11px;color:#c43d3d;background:transparent;padding:2px 6px;border:1px solid #c43d3d;border-radius:4px;cursor:pointer">ล้าง</button>
      </div>
      <form id="submitForm">
        <div class="form-row">
          <label>คำนำหน้า <span class="req">*</span></label>
          <select class="input" name="title" required>
            <option value="">-- เลือก --</option>
            <option>เด็กชาย</option><option>เด็กหญิง</option>
            <option>นาย</option><option>นางสาว</option>
            <option>นาง</option>
          </select>
        </div>
        <div class="form-row">
          <label>ชื่อ <span class="req">*</span></label>
          <input class="input" name="firstName" required>
        </div>
        <div class="form-row">
          <label>นามสกุล <span class="req">*</span></label>
          <input class="input" name="lastName" required>
        </div>
        <div class="form-row">
          <label>โรงเรียน <span class="req">*</span><span style="font-weight:400;color:var(--ink-soft);font-size:11px;"> (ไม่ต้องใส่คำว่า "โรงเรียน")</span></label>
          <input class="input" name="school" required placeholder="เช่น หนองถ่มวิทยา">
        </div>
        <div class="form-row">
          ${station.name.includes('ศิลปะ')
            ? `<label>ชื่อผลงาน <span class="req">*</span></label>
               <textarea class="textarea" name="workTitle" required placeholder="ชื่อผลงานศิลปะที่นักเรียนอัปโหลด"></textarea>`
            : `<label>ชื่อผลงาน <span class="req">*</span></label>

  const DRAFT_FIELDS = ['title','firstName','lastName','school','workTitle','work'];

  // Restore draft if exists
  const savedDraft = (() => { try{ return JSON.parse(localStorage.getItem(draftKey)||'null'); } catch(e){ return null; } })();
  if(savedDraft && Object.values(savedDraft).some(v=>v)){
    const form = document.getElementById('submitForm');
    DRAFT_FIELDS.forEach(name => {
      const el = form.elements[name];
      if(el && savedDraft[name]) el.value = savedDraft[name];
    });
    const notice = document.getElementById('draftNotice');
    if(notice) notice.style.display = 'flex';
  }

  // Auto-save on input
  let saveTimer;
  const tag = document.getElementById('autosaveTag');
  document.getElementById('submitForm').addEventListener('input', ()=>{
    clearTimeout(saveTimer);
    saveTimer = setTimeout(()=>{
      const form = document.getElementById('submitForm');
      if(!form) return;
      const draft = {};
      DRAFT_FIELDS.forEach(name => { draft[name] = form.elements[name]?.value || ''; });
      try{ localStorage.setItem(draftKey, JSON.stringify(draft)); } catch(e){}
      if(tag){ tag.style.display='block'; setTimeout(()=>{ if(tag) tag.style.display='none'; }, 1800); }
    }, 800);
  });

  document.getElementById('submitForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="loader"></span> กำลังส่ง...';
    try{
      const fd = new FormData(e.target);
      const isArt = station.name.includes('ศิลปะ');
      const data = {
        eventId: ev.id,
        eventName: ev.name,
        stationId: station.id,
        stationName: station.name,
        title: fd.get('title'),
        firstName: fd.get('firstName').trim(),
        lastName: fd.get('lastName').trim(),
        school: fd.get('school').trim(),
        workTitle: isArt ? (fd.get('workTitle')||'').trim() : (fd.get('workTitle')||'').trim(),
        work: isArt ? (fd.get('workTitle')||'').trim() : (fd.get('work')||'').trim(),
        fileUrl: '',
        fileName: '',
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      };
      const file = fd.get('file');
      if(file && file.size > 0){
        const result = await uploadFile(file, {
          eventName: ev.name,
          station: station.name,
          title: data.title,
          firstName: data.firstName,
          lastName: data.lastName,
          school: data.school,
          workTitle: data.workTitle,
          work: data.work,
        });
        data.fileUrl = result.fileUrl;
        data.fileName = file.name;
      }
      await db.collection('submissions').add(data);
      try{ localStorage.removeItem(draftKey); } catch(e){}

      await Swal.fire({
        icon: 'success',
        title: 'ส่งผลงานเรียบร้อยแล้ว!',
        html: `<div style="font-family:'Sarabun',sans-serif;font-size:15px;line-height:1.7;color:#2A2A2A">
          <b>${esc(data.title)} ${esc(data.firstName)} ${esc(data.lastName)}</b><br>
          📌 ฐาน: ${esc(station.name)}<br>
          🏫 โรงเรียน: ${esc(data.school)}<br>
          📝 ชื่อผลงาน: ${esc(data.workTitle||data.work||'-')}
        </div>`,
        confirmButtonText: 'ตกลง',
        confirmButtonColor: '#C9A961',
        timer: 6000,
        timerProgressBar: true,
        showClass: { popup: 'animate__animated animate__fadeInDown' },
      });

      e.target.reset();
      navigate('home');
    } catch(err){
      console.error(err);
      Swal.fire({
        icon: 'error',
        title: 'เกิดข้อผิดพลาด',
        text: err.message,
        confirmButtonText: 'ลองใหม่',
        confirmButtonColor: '#c43d3d',
      });
      btn.disabled = false;
      btn.innerHTML = 'ส่งผลงาน';
    }
  });
}

async function saveEditSubmission(subId){
  const stationEl = document.getElementById('editStation');
  const ev = getCurrentEvent();
  const station = ev?.stations?.find(s=>s.id===stationEl?.value);
  const data = {
    stationId:   stationEl?.value || '',
    stationName: station?.name || stationEl?.options[stationEl.selectedIndex]?.text || '',
    title:       document.getElementById('editTitle').value,
    firstName:   document.getElementById('editFirstName').value.trim(),
    lastName:    document.getElementById('editLastName').value.trim(),
    school:      document.getElementById('editSchool').value.trim(),
    workTitle:   document.getElementById('editWorkTitle').value.trim(),
    work:        document.getElementById('editWork').value.trim(),
    updatedAt:   firebase.firestore.FieldValue.serverTimestamp(),
  };
  if(!data.firstName||!data.lastName||!data.school){
    toast('กรุณากรอกข้อมูลให้ครบถ้วน','warn'); return;
  }
  try{
    await db.collection('submissions').doc(subId).update(data);
    toast('บันทึกการแก้ไขเรียบร้อยแล้ว ✓');
    closeModal();
    _cache.invalidate('submissions', ev?.id || getCurrentEvent()?.id);
    await reloadSubmissionsReport();
  } catch(e){
    toast('บันทึกไม่สำเร็จ: '+e.message,'error');
  }
}

      }
    }
  });
  if(!result.isConfirmed) return;
  try{
    await db.collection('submissions').doc(subId).delete();
    toast('ลบผลงานเรียบร้อยแล้ว ✓');
    _cache.invalidate('submissions', getCurrentEvent()?.id);
    await reloadSubmissionsReport();
  } catch(e){
    toast('ลบไม่สำเร็จ: '+e.message,'error');
  }
}

function selectRating(btn, name, val){
  const wrap = btn.parentNode;
  wrap.querySelectorAll('.rating-opt').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelector(`input[name="${name}"]`).value = val;
}

/* Force-refresh helpers (invalidate cache then reload) */
async function _forceRefreshSubs(){
  _cache.invalidate('submissions', getCurrentEvent()?.id);
  await reloadSubmissionsReport();
}
async function _forceRefreshEvals(){
  _cache.invalidate('evaluations', getCurrentEvent()?.id);
  await reloadEvaluationsReport();
}
function filterSubTable(q){
  const kw = q.trim().toLowerCase();
  const tbody = document.getElementById('subTableBody');
  if(!tbody) return;
  const rows = tbody.querySelectorAll('tr[data-search]');
  let visible = 0;
  rows.forEach(row => {
    const match = !kw || row.dataset.search.includes(kw);
    row.style.display = match ? '' : 'none';
    if(match) visible++;
  });
  // re-number visible rows
  let n = 1;
  rows.forEach(row => {
    if(row.style.display !== 'none'){
      const cell = row.querySelector('.row-num');
      if(cell) cell.textContent = n++;
    }
  });
  const countEl = document.getElementById('subSearchCount');
  if(countEl){
    countEl.textContent = kw ? `พบ ${visible} รายการ จากทั้งหมด ${rows.length} รายการ` : '';
  }
}

async function reloadEvaluationsReport(){
  const container = document.getElementById('evalReportContent');
  if(!container) return;
  const ev = getCurrentEvent();
  container.innerHTML = '<div class="loading-state"><span class="loader" style="border-color:var(--gold);border-top-color:transparent"></span> กำลังโหลด...</div>';
  let evals;
  try{
    evals = await getEvaluations(ev.id);
  } catch(e){
    _cache.invalidate('evaluations', ev.id);
    container.innerHTML = _reportErrorHTML('reloadEvaluationsReport', e.message);
    return;
  }
  const cats = state.settings.questions;
  if(evals.length === 0){
    container.innerHTML = `<div class="loading-state">ยังไม่มีผู้ตอบแบบประเมิน</div>`;
    return;
  }
  const allAvg = [];
  const catAverages = {};
  ['cat1','cat2','cat3'].forEach(catKey=>{
    const sums = cats[catKey].items.map(()=>0);
    cats[catKey].items.forEach((_,idx)=>{
      const vals = evals.map(e=>e.ratings?.[`${catKey}_q${idx}`]||0).filter(v=>v>0);
      sums[idx] = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
      allAvg.push(...vals);
    });
    catAverages[catKey] = sums;
  });
  const overallAvg = allAvg.length ? (allAvg.reduce((a,b)=>a+b,0)/allAvg.length) : 0;
  const interpret = v => v>=4.51?'มากที่สุด':v>=3.51?'มาก':v>=2.51?'ปานกลาง':v>=1.51?'น้อย':'น้อยที่สุด';

  // by station
  const byStation = {};
  state.settings.evalStations.forEach(s=>byStation[s.id] = {name:s.name, count:0});
  evals.forEach(e=>{
    if(!byStation[e.stationId]) byStation[e.stationId] = {name:e.stationName||'-',count:0};
    byStation[e.stationId].count++;
  });
  const genderCount = {ชาย:0,หญิง:0,ไม่ระบุ:0};
  evals.forEach(e=>{ if(genderCount[e.gender]!=null) genderCount[e.gender]++; else genderCount['ไม่ระบุ']++; });

  container.innerHTML = `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-num">${evals.length}</div><div class="stat-label">ผู้ตอบทั้งหมด</div></div>
      <div class="stat-card"><div class="stat-num">${overallAvg.toFixed(2)}</div><div class="stat-label">ค่าเฉลี่ยรวม</div></div>
      <div class="stat-card"><div class="stat-num" style="font-size:18px">${interpret(overallAvg)}</div><div class="stat-label">ระดับความพึงพอใจ</div></div>
      <div class="stat-card"><div class="stat-num">${new Set(evals.map(e=>e.school)).size}</div><div class="stat-label">โรงเรียน</div></div>
    </div>

    <h3 style="font-size:14px;color:var(--gold-deep);margin:18px 0 6px">จำแนกตามเพศ</h3>
    <div class="bar-chart">
      ${Object.entries(genderCount).map(([k,v])=>{
        const pct = evals.length ? (v/evals.length)*100 : 0;
        return `<div class="bar-row">
          <div class="bar-label">${k}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%">${v?v:''}</div></div>
          <div class="bar-value">${v}</div>
        </div>`;
      }).join('')}
    </div>

    <h3 style="font-size:14px;color:var(--gold-deep);margin:18px 0 6px">จำนวนผู้ประเมินต่อฐาน</h3>
    <div class="bar-chart">
      ${Object.values(byStation).map(s=>{
        const max = Math.max(1, ...Object.values(byStation).map(x=>x.count));
        const pct = (s.count/max)*100;
        return `<div class="bar-row">
          <div class="bar-label">${esc(s.name)}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%">${s.count>0?s.count:''}</div></div>
          <div class="bar-value">${s.count}</div>
        </div>`;
      }).join('')}
    </div>

    ${['cat1','cat2','cat3'].map(catKey=>`
      <div class="cat-head"><h3>${esc(cats[catKey].title)} (เฉลี่ย ${(catAverages[catKey].reduce((a,b)=>a+b,0)/catAverages[catKey].length).toFixed(2)})</h3></div>
      <div class="bar-chart">
        ${cats[catKey].items.map((q,idx)=>{
          const v = catAverages[catKey][idx];
          const pct = (v/5)*100;
          return `<div class="bar-row">
            <div class="bar-label">${idx+1}. ${esc(q.length>40?q.slice(0,40)+'...':q)}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%">${v.toFixed(2)}</div></div>
            <div class="bar-value">${interpret(v)}</div>
          </div>`;
        }).join('')}

function showCreateEventForm(){ showEventForm(null); }

function showEventForm(eventId){
  const modal = document.getElementById('modal');
  const editing = eventId ? state.events.find(e=>e.id===eventId) : null;
  const initial = editing || DEFAULT_EVENT;
  modal.innerHTML = `
    <div class="modal-head">
      <div class="modal-title">${editing?'แก้ไขรายการ':'สร้างรายการใหม่'}</div>
      <button class="close-btn" onclick="showEventManagement()">✕</button>
    </div>
    <div class="modal-body">
      <form id="eventForm">
        <div class="form-row">
          <label>ชื่อค่าย <span class="req">*</span></label>
          <textarea class="textarea" name="name" required style="min-height:60px">${esc(initial.name||'')}</textarea>
        </div>
        <div class="form-row">
          <label>วันที่จัดกิจกรรม <span class="req">*</span></label>
          <input class="input" name="date" required value="${esc(initial.date||'')}">
        </div>
        <div class="form-row">
          <label>สถานที่ <span class="req">*</span></label>
          <input class="input" name="location" required value="${esc(initial.location||'')}">
        </div>
        <div class="form-row">
          <label>วิทยากร</label>
          <input class="input" name="speaker" value="${esc(initial.speaker||'')}" placeholder="เช่น นายธำรง ทาทอง และคณะ">
        </div>
        <div class="form-row">
          <label>ฐานสำหรับส่งผลงาน</label>
          <div id="stationsList">
            ${initial.stations.map((s,i)=>stationRowHTML(s,i)).join('')}
          </div>
          <button type="button" class="btn btn-ghost" style="margin-top:8px;font-size:13px;padding:8px 14px" onclick="addStationRow()">+ เพิ่มฐาน</button>
        </div>
        <button type="submit" class="btn btn-block">${editing?'บันทึกการแก้ไข':'สร้างรายการ'}</button>
      </form>
    </div>
  `;
  document.getElementById('eventForm').addEventListener('submit', async e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const stations = [];
    document.querySelectorAll('#stationsList .station-edit-row').forEach(row=>{
      const name = row.querySelector('input[name="stName"]').value.trim();
      const allowFile = row.querySelector('input[name="stFile"]').checked;
      const id = row.dataset.sid;
      if(name) stations.push({id, name, allowFile});
    });
    if(stations.length===0){ toast('ต้องมีอย่างน้อย 1 ฐาน','error'); return; }
    const data = {
      name: fd.get('name').trim(),
      date: fd.get('date').trim(),
      location: fd.get('location').trim(),
      speaker: fd.get('speaker').trim(),
      stations,
    };
    if(editing){
      await updateEvent(eventId, data);
      toast('บันทึกการแก้ไขแล้ว');
    } else {
      const newEv = await createEvent(data);
      state.currentEventId = newEv.id;
      await saveSettings();
      toast('สร้างรายการใหม่แล้ว');
    }
    applyBranding();
    render();
    showEventManagement();
  });
}

function stationRowHTML(s, i){
  const sid = s.id || ('st'+Date.now()+i);
  return `<div class="station-edit-row" data-sid="${esc(sid)}" style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
    <input type="text" name="stName" class="input" value="${esc(s.name||'')}" placeholder="ชื่อฐาน" style="flex:1">
    <label style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--ink-soft);flex-shrink:0;cursor:pointer" title="เปิด = แสดงปุ่มอัปโหลดไฟล์ / ปิด = ซ่อนปุ่มอัปโหลด">
      <span style="white-space:nowrap">📎 อัปโหลด</span>
      <span class="toggle" style="display:inline-block"><input type="checkbox" name="stFile" ${s.allowFile!==false?'checked':''}><span class="slider"></span></span>
    </label>
    <button type="button" onclick="this.parentNode.remove()" style="color:#c43d3d;padding:8px;background:transparent">✕</button>
  </div>`;
}

function addStationRow(){
  const list = document.getElementById('stationsList');
  list.insertAdjacentHTML('beforeend', stationRowHTML({name:'',allowFile:true}, list.children.length));

  showEventManagement();

async function exportSubmissions(){
  toast('กำลังเตรียมไฟล์...');
  const ev = getCurrentEvent();
  const [subs, allJudging] = await Promise.all([
    getSubmissions(ev.id),
    getAllJudgingForEvent(ev.id),
  ]);
  // Build quick rank lookup: stationId → {submissionId → rank}
  const rankLookup = {};
  Object.entries(allJudging).forEach(([stId, jd])=>{
    rankLookup[stId] = jd.rankings || {};
  });
  const getR = (s) => rankLookup[s.stationId]?.[s.id] || '-';

  const wb = XLSX.utils.book_new();
  const all = subs.map((s,i)=>({
    ลำดับ:i+1, ฐาน:s.stationName||'', คำนำหน้า:s.title||'',
    ชื่อ:s.firstName||'', นามสกุล:s.lastName||'', โรงเรียน:s.school||'',
    ชื่อผลงาน:s.workTitle||'', เนื้อหาผลงาน:s.work||'',
    ลำดับที่ตัดสิน: getR(s),
    ลิงก์ไฟล์:s.fileUrl||'', วันที่ส่ง: s.createdAt?.toDate?fmtDate(s.createdAt.toDate()):'',
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(all), 'ทั้งหมด');
  ev.stations.forEach(st=>{
    const rows = subs.filter(s=>s.stationId===st.id)
      .sort((a,b)=>{
        const ra = rankLookup[st.id]?.[a.id]||999;
        const rb = rankLookup[st.id]?.[b.id]||999;
        return ra-rb;
      })
      .map((s,i)=>({
        ลำดับ:i+1, คำนำหน้า:s.title||'', ชื่อ:s.firstName||'', นามสกุล:s.lastName||'',
        โรงเรียน:s.school||'', ชื่อผลงาน:s.workTitle||'', เนื้อหาผลงาน:s.work||'',
        ลำดับที่ตัดสิน: getR(s),
        ลิงก์ไฟล์:s.fileUrl||'', วันที่ส่ง: s.createdAt?.toDate?fmtDate(s.createdAt.toDate()):'',
      }));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows.length?rows:[{}]), sanitizeSheetName(st.name));
  });
  XLSX.writeFile(wb, `ผลงาน_${ev.name.slice(0,30)}_${fmtDate(new Date())}.xlsx`);
  toast('ดาวน์โหลดเรียบร้อย ✓');
}

async function exportEvaluations(){
  toast('กำลังเตรียมไฟล์...');
  const all = await getAllEvaluations();
  const cats = state.settings.questions;
  const wb = XLSX.utils.book_new();

  const rowsForList = (list)=> list.map((e,i)=>{
    const row = {
      ลำดับ:i+1, รายการกิจกรรม:e.eventName||'', ฐาน:e.stationName||'',
      เพศ:e.gender||'', ระดับชั้น:e.grade||'', โรงเรียน:e.school||'',
    };
    ['cat1','cat2','cat3'].forEach(catKey=>{
      cats[catKey].items.forEach((q,idx)=>{
        row[`${cats[catKey].title.slice(0,8)}_ข้อ${idx+1}`] = e.ratings?.[`${catKey}_q${idx}`]||'';
      });
    });
    (e.openAnswers||[]).forEach((oa,idx)=>{
      row[`อัตนัย_${idx+1}`] = oa.answer||'';
    });
    row['วันที่ตอบ'] = e.createdAt?.toDate?fmtDate(e.createdAt.toDate()):'';
    return row;
  });

  // Combined sheet
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rowsForList(all).length?rowsForList(all):[{}]), 'รวมทุกรายการ');
  // Per-event sheets
  const byEvent = {};
  all.forEach(e=>{ (byEvent[e.eventId]=byEvent[e.eventId]||{name:e.eventName||e.eventId,list:[]}).list.push(e); });
  Object.entries(byEvent).forEach(([eid, val])=>{
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rowsForList(val.list)), sanitizeSheetName(val.name));
  });
  XLSX.writeFile(wb, `ผลประเมิน_${fmtDate(new Date())}.xlsx`);
  toast('ดาวน์โหลดเรียบร้อย ✓');
}

function sanitizeSheetName(name){
  return (name||'sheet').replace(/[\\\/\?\*\[\]:]/g,'').slice(0,30);
}

function fmtDate(d){
  return `${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`;
}

async function saveQuestionsSettings(){
  // Eval stations
  const newEvalSt = [];
  document.querySelectorAll('#evalStList .q-item').forEach(row=>{
    const name = row.querySelector('input').value.trim();
    if(name) newEvalSt.push({id: row.dataset.sid, name});
  });
  if(newEvalSt.length===0){ toast('ต้องมีอย่างน้อย 1 ฐานประเมิน','error'); return; }
  state.settings.evalStations = newEvalSt;

  // Categories
  ['cat1','cat2','cat3'].forEach(catKey=>{
    const title = document.querySelector(`input[data-cat-title="${catKey}"]`).value.trim() || state.settings.questions[catKey].title;

      const v = inp.value.trim();
      if(v) items.push(v);
    });
    if(items.length>0) state.settings.questions[catKey] = {title, items};
  });

  // Open questions
  const opens = [];
  document.querySelectorAll('#openList .q-item input').forEach(inp=>{
    const v = inp.value.trim();
    if(v) opens.push(v);
  });

}

function downloadDoc(html, filename){

}

async function fetchAsDataUrl(url){
  if(!url) return '';
  if(url.startsWith('data:')) return url;
  try{
    const resp = await fetch(url, {mode:'cors'});
    if(!resp.ok) return '';
    const blob = await resp.blob();
    return await new Promise((res,rej)=>{
      const fr = new FileReader();
      fr.onload = ()=>res(fr.result);
      fr.onerror = rej;
      fr.readAsDataURL(blob);
    });
  } catch(e){ return ''; }
}

async function generatePagedPdf(pageHtmls, filename, sharedStyle){
  if(!window.jspdf || !window.html2canvas){
    toast('PDF library ยังโหลดไม่เสร็จ ลองใหม่อีกครั้ง','error'); return;
  }
  toast('กำลังสร้าง PDF... ('+pageHtmls.length+' หน้า)');

  let logoTag = '';
  if(state.settings.logoUrl){
    const dataUrl = await fetchAsDataUrl(state.settings.logoUrl);
    if(dataUrl) logoTag = `<img src="${dataUrl}" style="width:64px;height:64px;border-radius:50%;object-fit:cover;display:block;margin:0 auto"/>`;
  }

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ unit:'mm', format:'a4', orientation:'portrait', compress:true });

  for(let i=0; i<pageHtmls.length; i++){
    const html = pageHtmls[i].replace(/__LOGO__/g, logoTag);
    const wrap = document.createElement('div');
    wrap.style.cssText = 'position:fixed;left:-99999px;top:0;width:210mm;height:297mm;background:#fff;overflow:hidden';
    wrap.innerHTML = `<style>${sharedStyle}</style>${html}`;
    document.body.appendChild(wrap);
    try{
      const imgs = wrap.querySelectorAll('img');
      await Promise.all(Array.from(imgs).map(img =>
        (img.complete && img.naturalHeight) ? Promise.resolve() : new Promise(r=>{
          img.onload = r; img.onerror = r; setTimeout(r, 2500);
        })
      ));
      if(document.fonts && document.fonts.ready) await document.fonts.ready;
      const canvas = await window.html2canvas(wrap, {
        scale:2, useCORS:true, allowTaint:true, logging:false, backgroundColor:'#ffffff'
      });
      const imgData = canvas.toDataURL('image/jpeg', 0.93);
      if(i>0) pdf.addPage();
      pdf.addImage(imgData, 'JPEG', 0, 0, 210, 297);
    } catch(e){
      console.error('PDF page error', e);
      toast('สร้างหน้า '+(i+1)+' ไม่สำเร็จ: '+e.message,'error');
    } finally {
      document.body.removeChild(wrap);
    }
  }

  pdf.save(filename);
  toast('ดาวน์โหลด PDF เรียบร้อย ✓');
}

function makeQR(text, size=260){
  const canvas = document.createElement('canvas');
  new QRious({element:canvas, value:text, size, level:'H', background:'#ffffff', foreground:'#5A4A24'});
  return canvas.toDataURL('image/png');
}

   JUDGING — FIRESTORE HELPERS
   ============================================================ */
function judgingDocId(eventId, stationId){ return `${eventId}_${stationId}`; }

async function getJudging(eventId, stationId){
  const snap = await db.collection('judging').doc(judgingDocId(eventId,stationId)).get();
  return snap.exists ? snap.data() : null;
}

async function saveJudging(eventId, stationId, rankings){
  await db.collection('judging').doc(judgingDocId(eventId,stationId)).set({
    eventId, stationId, rankings,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
  }, {merge:true});
}

async function getAllJudgingForEvent(eventId){
  const snap = await db.collection('judging').where('eventId','==',eventId).get();
  const result = {};
  snap.docs.forEach(d=>{ result[d.data().stationId] = d.data(); });
  return result;
}

function judgeStatus(subs, judging){
  if(!judging || !judging.rankings || Object.keys(judging.rankings).length === 0) return 'pending';
  const ranked = Object.values(judging.rankings).filter(v=>v>0).length;
  return ranked >= subs.length ? 'done' : 'progress';
}

function badgeHTML(status){
  const map = {
    done: ['badge-done','ตัดสินแล้ว'],
    progress: ['badge-progress','อยู่ในระหว่างตัดสิน'],
    pending: ['badge-pending','ยังไม่ตัดสิน'],
  };
  const [cls, label] = map[status] || map.pending;
  return `<span class="badge ${cls}">${label}</span>`;
}

function getDriveImageUrl(fileUrl){
  if(!fileUrl) return null;
  let id = null;
  const patterns = [
    /\/file\/d\/([a-zA-Z0-9_-]{15,})/,   // /file/d/ID/view
    /[?&]id=([a-zA-Z0-9_-]{15,})/,        // ?id=ID
    /\/d\/([a-zA-Z0-9_-]{15,})\//,         // /d/ID/
  ];
  for(const p of patterns){ const m = fileUrl.match(p); if(m){ id=m[1]; break; } }
  if(!id) return null;
  // Use thumbnail endpoint — works for shared-with-link files, no CORS issue for <img>
  return { img: `https://drive.google.com/thumbnail?id=${id}&sz=w1200-h1200`, id };
}

function exportJudgingExcel(ev, station, subs, rankings){
  const wb = XLSX.utils.book_new();
  const rows = subs
    .map(s=>({ ...s, _rank: rankings[s.id]||0 }))
    .sort((a,b)=> a._rank===0 ? 1 : b._rank===0 ? -1 : a._rank-b._rank)
    .map((s,i)=>({
      ลำดับที่ตัดสิน: s._rank||'-',
      คำนำหน้า: s.title||'', ชื่อ: s.firstName||'', นามสกุล: s.lastName||'',
      โรงเรียน: s.school||'', ชื่อผลงาน: s.workTitle||'', เนื้อหาผลงาน: s.work||'',
      ลิงก์ไฟล์: s.fileUrl||'',
    }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows.length?rows:[{}]), sanitizeSheetName(station.name));
  XLSX.writeFile(wb, `ตัดสิน_${sanitizeSheetName(station.name)}_${ev.name.slice(0,20)}_${fmtDate(new Date())}.xlsx`);
  toast('ดาวน์โหลด Excel แล้ว ✓');
}

async function saveHintsSettings(){
  ['submit','evaluate','judge'].forEach(key=>{
    state.settings.hints[key] = {
      enabled: document.getElementById(`hintEnabled_${key}`).checked,
      title: document.getElementById(`hintTitle_${key}`)?.value.trim() || '',
      body:  document.getElementById(`hintBody_${key}`)?.value || '',
    };
  });
  await saveSettings();
  toast('บันทึกการตั้งค่า Modal แนะนำแล้ว ✓');
  showSettingsMenu();

async function resetHintsToDefault(){

async function confirmClearData(type){
  const ev = getCurrentEvent();
  if(!ev) return;
  const labels = {
    submissions: 'ข้อมูลการส่งผลงาน',
    evaluations: 'ข้อมูลการประเมิน',
    judging: 'ผลการตัดสินผลงาน',
    all: 'ข้อมูลทั้งหมด (ผลงาน + ประเมิน + ตัดสิน)',
  };
  const result = await Swal.fire({
    icon: 'warning',
    title: `ยืนยันการลบ${labels[type]}?`,
    html: `<div style="font-family:'Sarabun',sans-serif;font-size:14px;color:#444">
      รายการ: <b>${esc(ev.name)}</b><br>
      การกระทำนี้<b style="color:#c43d3d">ไม่สามารถย้อนกลับได้</b>
    </div>`,
    showCancelButton: true,
    confirmButtonText: 'ลบเลย',
    cancelButtonText: 'ยกเลิก',
    confirmButtonColor: '#c43d3d',
    cancelButtonColor: '#C9A961',
    input: 'text',
    inputPlaceholder: 'พิมพ์ "ยืนยัน" เพื่อดำเนินการต่อ',
    preConfirm: (val) => {
      if(val !== 'ยืนยัน'){
        Swal.showValidationMessage('กรุณาพิมพ์ "ยืนยัน" ให้ถูกต้อง');
        return false;
      }
    }
  });
  if(!result.isConfirmed) return;

  const loading = Swal.fire({ title:'กำลังลบข้อมูล...', allowOutsideClick:false, didOpen:()=>Swal.showLoading() });
  try{
    const batch = db.batch();
    const deleteCol = async (col, field) => {
      const snap = await db.collection(col).where(field,'==',ev.id).get();
      snap.docs.forEach(d => batch.delete(d.ref));
    };
    if(type==='submissions'||type==='all') await deleteCol('submissions','eventId');
    if(type==='evaluations'||type==='all') await deleteCol('evaluations','eventId');
    if(type==='judging'||type==='all') await deleteCol('judging','eventId');
    await batch.commit();
    // Invalidate relevant caches
    if(type==='submissions'||type==='all') _cache.invalidate('submissions', ev.id);
    if(type==='evaluations'||type==='all') _cache.invalidate('evaluations', ev.id);
    await loading;
    Swal.fire({ icon:'success', title:'ลบข้อมูลเรียบร้อย', timer:2000, timerProgressBar:true, showConfirmButton:false });
    render();
    showSettingsMenu();
  } catch(err){
    await loading;
    Swal.fire({ icon:'error', title:'เกิดข้อผิดพลาด', text:err.message, confirmButtonColor:'#c43d3d' });
  }
}
